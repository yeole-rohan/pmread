name: Deploy

on:
  push:
    branches: [stage, main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── CI — runs on push to stage AND on every PR targeting main ────────────
  ci:
    name: CI checks
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/stage') ||
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pmread_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      # ── Frontend ────────────────────────────────────────────────────────

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --silent
        working-directory: app

      - name: Type-check frontend
        run: npx tsc --noEmit
        working-directory: app

      - name: Frontend tests (Vitest)
        run: npm test
        working-directory: app

      - name: Build frontend (dry-run)
        run: npm run build
        working-directory: app
        env:
          NEXT_PUBLIC_SITE_URL: https://pmread.org

      # ── Backend ─────────────────────────────────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: pip install -q -r api/requirements.txt

      - name: Lint API (ruff)
        run: pip install -q ruff && ruff check api/app

      - name: Backend unit tests
        run: python -m pytest tests/unit/ -q
        working-directory: api

      - name: Backend integration tests (PostgreSQL)
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pmread_test
          JWT_SECRET: ci-test-jwt-secret-not-used-in-prod
          FRONTEND_URL: http://localhost:3000
          ANTHROPIC_API_KEY: dummy
        run: python -m pytest tests/integration/ -q
        working-directory: api

  # ── Stage deploy — only runs after CI passes on push to stage ────────────
  stage-deploy:
    name: Deploy to Staging
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to pmread-stage via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR_STAGE }}

            echo "--- Pulling stage ---"
            git pull origin stage

            echo "--- Installing Python dependencies ---"
            source api/venv/bin/activate
            pip install -q -r api/requirements.txt

            echo "--- Running DB migrations ---"
            cd api && alembic upgrade head && cd ..

            echo "--- Building frontend ---"
            cd app
            npm ci --silent
            NEXT_PUBLIC_SITE_URL=https://staging-pmread.rohanyeole.com \
            NEXT_PUBLIC_NOINDEX=true \
            npm run build
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public
            cd ..

            echo "--- Restarting staging services ---"
            sudo systemctl restart pmread-stage-api
            sudo systemctl restart pmread-stage-worker
            pm2 restart pmread-stage-frontend --update-env

            echo "--- Verifying worker ---"
            sleep 3
            systemctl is-active pmread-stage-worker || (echo "Worker failed to start" && exit 1)

            echo "--- Stage deploy complete ---"

  # ── Prod deploy — triggered only by merge (push) into main ───────────────
  prod-deploy:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to pmread-prod via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR_PROD }}

            echo "--- Pulling main ---"
            git pull origin main

            echo "--- Installing Python dependencies ---"
            source api/venv/bin/activate
            pip install -q -r api/requirements.txt

            echo "--- Running DB migrations ---"
            cd api && alembic upgrade head && cd ..

            echo "--- Building frontend ---"
            cd app
            npm ci --silent
            NEXT_PUBLIC_SITE_URL=https://pmread.org \
            npm run build
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public
            cd ..

            echo "--- Restarting production services ---"
            sudo systemctl restart pmread-prod-api
            sudo systemctl restart pmread-prod-worker
            pm2 restart pmread-prod-frontend --update-env

            echo "--- Verifying worker ---"
            sleep 3
            systemctl is-active pmread-prod-worker || (echo "Worker failed to start" && exit 1)

            echo "--- Prod deploy complete ---"