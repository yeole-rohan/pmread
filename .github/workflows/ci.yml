name: CI

on:
  pull_request:
    branches: [stage]   # CI only on PRs targeting stage

jobs:
  backend:
    name: Backend — lint & security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety

      - name: Lint (ruff)
        run: ruff check app/

      - name: Security — bandit (SAST)
        run: bandit -r app/ -ll -x app/tests

      - name: Security — safety (dependency CVEs)
        run: safety check --file requirements.txt --full-report
        continue-on-error: true   # advisory; don't hard-fail on transitive CVEs

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
          ANTHROPIC_API_KEY: dummy
          FRONTEND_URL: http://localhost:3000
          RAZORPAY_KEY_ID: dummy
          RAZORPAY_KEY_SECRET: dummy
          CELERY_BROKER_URL: memory://
        run: |
          pip install pytest pytest-asyncio httpx
          pytest app/tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping"

  frontend:
    name: Frontend — type-check & audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Security — npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
