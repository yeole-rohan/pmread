name: CI

on:
  pull_request:
    branches: [stage]   # CI only on PRs targeting stage

jobs:
  backend:
    name: Backend — lint, security & tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pmread_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit safety

      - name: Lint (ruff)
        run: ruff check app/

      - name: Security — bandit (SAST)
        run: bandit -r app/ -ll -x app/tests

      - name: Security — safety (dependency CVEs)
        run: safety check --file requirements.txt --full-report
        continue-on-error: true

      - name: Unit tests (no DB)
        run: pytest tests/unit/ -q

      - name: Integration tests (PostgreSQL)
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pmread_test
          JWT_SECRET: ci-test-jwt-secret-not-used-in-prod
          FRONTEND_URL: http://localhost:3000
          ANTHROPIC_API_KEY: dummy
        run: pytest tests/integration/ -q

  frontend:
    name: Frontend — type-check, tests & audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Security — npm audit
        run: npm audit --audit-level=high
        continue-on-error: true
