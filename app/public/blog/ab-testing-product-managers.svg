<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#7F77DD" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Funnel / split line -->
  <line x1="600" y1="120" x2="600" y2="195" stroke="#7F77DD" stroke-width="3" opacity="0.35"/>
  <!-- Left branch -->
  <line x1="600" y1="195" x2="340" y2="260" stroke="#7F77DD" stroke-width="2.5" opacity="0.3"/>
  <!-- Right branch -->
  <line x1="600" y1="195" x2="860" y2="260" stroke="#A78BFA" stroke-width="2.5" opacity="0.3"/>

  <!-- Source traffic pill -->
  <rect x="510" y="90" width="180" height="44" rx="22" fill="white" filter="url(#shadow)"/>
  <rect x="530" y="108" width="60" height="8" rx="4" fill="#7F77DD" opacity="0.45"/>
  <rect x="598" y="108" width="70" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>

  <!-- Variant A card -->
  <rect x="140" y="260" width="380" height="280" rx="18" fill="white" filter="url(#shadow)"/>
  <rect x="140" y="260" width="380" height="50" rx="18" fill="#7F77DD"/>
  <rect x="140" y="292" width="380" height="18" fill="#7F77DD"/>
  <!-- A label -->
  <circle cx="175" cy="285" r="14" fill="white" opacity="0.2"/>
  <rect x="163" y="280" width="24" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="205" y="280" width="80" height="10" rx="5" fill="white" opacity="0.4"/>

  <!-- A body: button variant -->
  <rect x="165" y="330" width="320" height="40" rx="10" fill="#7F77DD" opacity="0.12"/>
  <rect x="195" y="344" width="100" height="12" rx="6" fill="#7F77DD" opacity="0.5"/>

  <!-- A metrics -->
  <rect x="165" y="388" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="165" y="404" width="240" height="16" rx="8" fill="#7F77DD" opacity="0.7"/>
  <rect x="165" y="428" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>
  <rect x="165" y="444" width="180" height="16" rx="8" fill="#7F77DD" opacity="0.45"/>
  <rect x="165" y="468" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.25"/>
  <rect x="165" y="484" width="120" height="16" rx="8" fill="#7F77DD" opacity="0.3"/>

  <!-- Variant B card -->
  <rect x="680" y="260" width="380" height="280" rx="18" fill="white" filter="url(#shadow)"/>
  <rect x="680" y="260" width="380" height="50" rx="18" fill="#A78BFA" opacity="0.85"/>
  <rect x="680" y="292" width="380" height="18" fill="#A78BFA" opacity="0.85"/>
  <!-- B label -->
  <circle cx="715" cy="285" r="14" fill="white" opacity="0.2"/>
  <rect x="703" y="280" width="24" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="745" y="280" width="80" height="10" rx="5" fill="white" opacity="0.4"/>

  <!-- B body: different button variant -->
  <rect x="705" y="330" width="320" height="40" rx="20" fill="#A78BFA" opacity="0.2"/>
  <rect x="735" y="344" width="120" height="12" rx="6" fill="#A78BFA" opacity="0.6"/>

  <!-- B metrics (winner — longer bars) -->
  <rect x="705" y="388" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="705" y="404" width="290" height="16" rx="8" fill="#A78BFA" opacity="0.75"/>
  <!-- winner badge -->
  <circle cx="1010" cy="412" r="10" fill="#22C55E" opacity="0.85"/>
  <path d="M1005 412 l3 3 l6-6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="705" y="428" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>
  <rect x="705" y="444" width="220" height="16" rx="8" fill="#A78BFA" opacity="0.5"/>
  <rect x="705" y="468" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.25"/>
  <rect x="705" y="484" width="160" height="16" rx="8" fill="#A78BFA" opacity="0.35"/>

  <!-- Significance meter at bottom -->
  <rect x="400" y="575" width="400" height="14" rx="7" fill="white" opacity="0.5"/>
  <rect x="400" y="575" width="310" height="14" rx="7" fill="#22C55E" opacity="0.5"/>
  <rect x="610" y="571" width="2" height="22" rx="1" fill="#374151" opacity="0.3"/>

  <!-- Decorative -->
  <circle cx="100" cy="540" r="50" fill="#7F77DD" opacity="0.05"/>
  <circle cx="1100" cy="100" r="40" fill="#A78BFA" opacity="0.06"/>
</svg>
