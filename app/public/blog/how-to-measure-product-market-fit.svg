<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F7FF"/>
      <stop offset="100%" stop-color="#F0EDFF"/>
    </linearGradient>
    <linearGradient id="pmfLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7F77DD"/>
      <stop offset="100%" stop-color="#4B44A8"/>
    </linearGradient>
    <linearGradient id="noPmfLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
    <linearGradient id="fillPmf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Chart area -->
  <!-- Y axis -->
  <line x1="220" y1="100" x2="220" y2="500" stroke="#E5E7EB" stroke-width="2"/>
  <!-- X axis -->
  <line x1="220" y1="500" x2="980" y2="500" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Grid lines horizontal -->
  <line x1="220" y1="200" x2="980" y2="200" stroke="#F3F4F6" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="220" y1="300" x2="980" y2="300" stroke="#F3F4F6" stroke-width="1" stroke-dasharray="6 4"/>
  <line x1="220" y1="400" x2="980" y2="400" stroke="#F3F4F6" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- "No PMF" curve — drops to zero -->
  <path d="M 220 140 C 340 160 420 280 520 400 C 580 460 650 490 980 498"
        stroke="url(#noPmfLine)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- "PMF" curve — drops then flattens -->
  <path d="M 220 140 C 320 150 400 220 500 310 C 570 370 640 390 760 395 C 840 395 900 395 980 394"
        stroke="url(#pmfLine)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Fill under PMF curve -->
  <path d="M 220 140 C 320 150 400 220 500 310 C 570 370 640 390 760 395 C 840 395 900 395 980 394 L 980 500 L 220 500 Z"
        fill="url(#fillPmf)"/>

  <!-- "Flattens here" annotation circle -->
  <circle cx="730" cy="395" r="18" fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-dasharray="4 3"/>
  <circle cx="730" cy="395" r="6" fill="#7F77DD"/>

  <!-- X-axis tick labels (week markers as dots) -->
  <circle cx="350" cy="503" r="3" fill="#D1D5DB"/>
  <circle cx="480" cy="503" r="3" fill="#D1D5DB"/>
  <circle cx="610" cy="503" r="3" fill="#D1D5DB"/>
  <circle cx="740" cy="503" r="3" fill="#D1D5DB"/>
  <circle cx="870" cy="503" r="3" fill="#D1D5DB"/>

  <!-- Y-axis label dots -->
  <circle cx="217" cy="200" r="3" fill="#D1D5DB"/>
  <circle cx="217" cy="300" r="3" fill="#D1D5DB"/>
  <circle cx="217" cy="400" r="3" fill="#D1D5DB"/>

  <!-- Legend pills -->
  <rect x="560" y="560" width="16" height="5" rx="2" fill="#7F77DD"/>
  <rect x="582" y="558" width="90" height="9" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="720" y="560" width="16" height="5" rx="2" fill="#D1D5DB"/>
  <rect x="742" y="558" width="90" height="9" rx="4" fill="#9CA3AF" opacity="0.3"/>

  <!-- 40% label area on y-axis -->
  <rect x="130" y="390" width="70" height="20" rx="5" fill="#7F77DD" opacity="0.1"/>
  <rect x="138" y="397" width="50" height="7" rx="3" fill="#7F77DD" opacity="0.5"/>

  <!-- Decorative -->
  <circle cx="1090" cy="120" r="70" fill="#7F77DD" opacity="0.04"/>
  <circle cx="80" cy="480" r="50" fill="#A78BFA" opacity="0.05"/>
</svg>
