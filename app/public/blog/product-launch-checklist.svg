<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#7F77DD" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Main checklist card -->
  <rect x="120" y="60" width="580" height="510" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="120" y="60" width="580" height="56" rx="20" fill="#7F77DD"/>
  <rect x="120" y="96" width="580" height="20" fill="#7F77DD"/>
  <rect x="150" y="78" width="100" height="10" rx="5" fill="white" opacity="0.65"/>
  <rect x="258" y="80" width="60" height="6" rx="3" fill="white" opacity="0.3"/>

  <!-- Phase labels and items -->
