  <circle cx="820" cy="320" r="10" fill="#7F77DD" opacity="0.65"/>
  <rect x="840" y="308" width="230" height="36" rx="8" fill="#F5F3FF"/>
  <rect x="856" y="317" width="70" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="856" y="330" width="150" height="6" rx="3" fill="#9CA3AF" opacity="0.3"/>

