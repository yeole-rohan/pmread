  <rect x="148" y="284" width="18" height="18" rx="4" fill="#7F77DD" opacity="0.8"/>
  <path d="M152 293 l4 4 l8-8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="176" y="287" width="260" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>

  <rect x="148" y="312" width="18" height="18" rx="4" fill="#7F77DD" opacity="0.8"/>
  <path d="M152 321 l4 4 l8-8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="176" y="315" width="220" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>

  <rect x="148" y="340" width="18" height="18" rx="4" fill="#7F77DD" opacity="0.8"/>
  <path d="M152 349 l4 4 l8-8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="176" y="343" width="200" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>

  <line x1="148" y1="372" x2="660" y2="372" stroke="#F3F4F6" stroke-width="1.5"/>

