  <circle cx="820" cy="160" r="10" fill="#7F77DD" opacity="0.8"/>
  <rect x="840" y="148" width="230" height="36" rx="8" fill="#F5F3FF"/>
  <rect x="856" y="157" width="80" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="856" y="170" width="140" height="6" rx="3" fill="#9CA3AF" opacity="0.3"/>

  <!-- 2 weeks -->
  <circle cx="820" cy="240" r="10" fill="#7F77DD" opacity="0.7"/>
  <rect x="840" y="228" width="230" height="36" rx="8" fill="#F5F3FF"/>
  <rect x="856" y="237" width="90" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="856" y="250" width="130" height="6" rx="3" fill="#9CA3AF" opacity="0.3"/>

