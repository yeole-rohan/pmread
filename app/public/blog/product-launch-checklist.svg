  <circle cx="820" cy="480" r="10" fill="#D1D5DB"/>
  <rect x="840" y="468" width="230" height="36" rx="8" fill="#F9FAFB"/>
  <rect x="856" y="477" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="856" y="490" width="120" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- Decorative -->
  <circle cx="80" cy="560" r="45" fill="#7F77DD" opacity="0.05"/>
  <circle cx="1130" cy="80" r="40" fill="#A78BFA" opacity="0.05"/>
