  <rect x="176" y="219" width="180" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>

  <line x1="148" y1="248" x2="660" y2="248" stroke="#F3F4F6" stroke-width="1.5"/>

  <!-- 2 weeks -->
