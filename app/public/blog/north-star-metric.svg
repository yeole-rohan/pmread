<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E1B4B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#1E1B4B"/>

  <!-- Constellation connecting lines -->
  <line x1="600" y1="230" x2="320" y2="400" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.35"/>
  <line x1="600" y1="230" x2="600" y2="420" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.35"/>
  <line x1="600" y1="230" x2="880" y2="400" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.35"/>
  <line x1="320" y1="400" x2="600" y2="420" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 4" opacity="0.2"/>
  <line x1="880" y1="400" x2="600" y2="420" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 4" opacity="0.2"/>

  <!-- North star glow -->
  <circle cx="600" cy="230" r="80" fill="url(#starGlow)"/>

  <!-- North star (larger, brighter) -->
  <polygon points="600,178 611,215 650,215 619,237 630,274 600,252 570,274 581,237 550,215 589,215"
           fill="#C4B5FD" opacity="0.95"/>
  <polygon points="600,196 607,218 630,218 612,230 619,252 600,240 581,252 588,230 570,218 593,218"
           fill="white" opacity="0.9"/>

  <!-- Metric KPI boxes connected to north star -->
  <!-- Box 1 - Acquisition -->
  <rect x="200" y="360" width="200" height="80" rx="12" fill="#2D2A5E"/>
  <rect x="200" y="360" width="200" height="80" rx="12" fill="none" stroke="#7F77DD" stroke-width="1.5" opacity="0.5"/>
  <!-- Mini bar chart inside -->
  <rect x="220" y="410" width="14" height="20" rx="3" fill="#7F77DD" opacity="0.5"/>
  <rect x="240" y="400" width="14" height="30" rx="3" fill="#7F77DD" opacity="0.6"/>
  <rect x="260" y="393" width="14" height="37" rx="3" fill="#7F77DD" opacity="0.8"/>
  <rect x="280" y="385" width="14" height="45" rx="3" fill="#7F77DD"/>
  <rect x="300" y="375" width="14" height="55" rx="3" fill="#A78BFA"/>
  <!-- Label line -->
  <rect x="336" y="388" width="50" height="6" rx="3" fill="#7F77DD" opacity="0.4"/>
  <rect x="336" y="400" width="40" height="5" rx="2" fill="#4B5563" opacity="0.6"/>

  <!-- Box 2 - Activation -->
  <rect x="500" y="380" width="200" height="80" rx="12" fill="#2D2A5E"/>
  <rect x="500" y="380" width="200" height="80" rx="12" fill="none" stroke="#7F77DD" stroke-width="1.5" opacity="0.5"/>
  <!-- Funnel mini icon -->
  <path d="M520 400 L560 400 L548 420 L548 440 L532 440 L532 420 Z" fill="#7F77DD" opacity="0.5"/>
  <path d="M522 402 L558 402 L548 420 L548 438 L532 438 L532 420 Z" fill="#7F77DD" opacity="0.7"/>
  <rect x="582" y="408" width="50" height="6" rx="3" fill="#7F77DD" opacity="0.4"/>
  <rect x="582" y="420" width="40" height="5" rx="2" fill="#4B5563" opacity="0.6"/>

  <!-- Box 3 - Retention -->
  <rect x="800" y="360" width="200" height="80" rx="12" fill="#2D2A5E"/>
  <rect x="800" y="360" width="200" height="80" rx="12" fill="none" stroke="#7F77DD" stroke-width="1.5" opacity="0.5"/>
  <!-- Retention curve mini -->
  <path d="M820 420 C840 400 860 393 900 392 C930 392 950 392 975 392"
        stroke="#A78BFA" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M820 420 C840 410 860 430 900 448 C930 462 950 468 975 470"
        stroke="#4B5563" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Dim stars in background -->
  <circle cx="180" cy="140" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="900" cy="100" r="3" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="1050" cy="200" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="150" cy="300" r="2" fill="#A78BFA" opacity="0.4"/>
  <circle cx="1100" cy="450" r="2" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="350" cy="160" r="1.5" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="750" cy="120" r="2" fill="#C4B5FD" opacity="0.45"/>

  <!-- "North Star" label area (no text - just the metric box) -->
  <rect x="500" y="150" width="200" height="50" rx="10" fill="#7F77DD" opacity="0.15"/>
  <rect x="515" y="163" width="170" height="10" rx="5" fill="#7F77DD" opacity="0.5"/>
  <rect x="530" y="180" width="140" height="7" rx="3" fill="#7F77DD" opacity="0.3"/>
</svg>
