<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F7FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Header row: Q labels as colored dots + lines -->
  <circle cx="310" cy="110" r="6" fill="#7F77DD" opacity="0.5"/>
  <rect x="325" y="104" width="30" height="12" rx="6" fill="#7F77DD" opacity="0.3"/>
  <circle cx="530" cy="110" r="6" fill="#7F77DD" opacity="0.5"/>
  <rect x="545" y="104" width="30" height="12" rx="6" fill="#7F77DD" opacity="0.3"/>
  <circle cx="750" cy="110" r="6" fill="#7F77DD" opacity="0.5"/>
  <rect x="765" y="104" width="30" height="12" rx="6" fill="#7F77DD" opacity="0.3"/>
  <circle cx="970" cy="110" r="6" fill="#7F77DD" opacity="0.5"/>
  <rect x="985" y="104" width="30" height="12" rx="6" fill="#7F77DD" opacity="0.3"/>

  <!-- Vertical quarter dividers -->
  <line x1="310" y1="130" x2="310" y2="560" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="530" y1="130" x2="530" y2="560" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="750" y1="130" x2="750" y2="560" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="970" y1="130" x2="970" y2="560" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Left lane labels (colored dot + line) -->
  <circle cx="172" cy="190" r="8" fill="#7F77DD"/>
  <rect x="190" y="184" width="80" height="12" rx="6" fill="#7F77DD" opacity="0.2"/>
  <circle cx="172" cy="290" r="8" fill="#5EEAD4"/>
  <rect x="190" y="284" width="80" height="12" rx="6" fill="#5EEAD4" opacity="0.2"/>
  <circle cx="172" cy="390" r="8" fill="#F59E0B"/>
  <rect x="190" y="384" width="80" height="12" rx="6" fill="#F59E0B" opacity="0.2"/>
  <circle cx="172" cy="490" r="8" fill="#A78BFA"/>
  <rect x="190" y="484" width="80" height="12" rx="6" fill="#A78BFA" opacity="0.2"/>

  <!-- Lane 1: Activation (purple) -->
  <!-- Bar from Q1 through Q2 -->
  <rect x="310" y="170" width="350" height="40" rx="8" fill="#7F77DD" opacity="0.8"/>
  <circle cx="660" cy="190" r="8" fill="#4B44A8"/>
  <!-- Milestone tick -->
  <line x1="660" y1="215" x2="660" y2="228" stroke="#7F77DD" stroke-width="2" opacity="0.5"/>
  <!-- Short Q3 follow-up -->
  <rect x="750" y="170" width="150" height="40" rx="8" fill="#7F77DD" opacity="0.35"/>

  <!-- Lane 2: Retention (teal) -->
  <!-- Starts Q2 -->
  <rect x="530" y="270" width="300" height="40" rx="8" fill="#0D9488" opacity="0.7"/>
  <circle cx="830" cy="290" r="8" fill="#0D9488"/>
  <line x1="830" y1="315" x2="830" y2="328" stroke="#0D9488" stroke-width="2" opacity="0.5"/>
  <!-- Continues Q4 -->
  <rect x="970" y="270" width="80" height="40" rx="8" fill="#0D9488" opacity="0.35"/>

  <!-- Lane 3: Monetisation (amber) -->
  <!-- Q3 only -->
  <rect x="750" y="370" width="180" height="40" rx="8" fill="#F59E0B" opacity="0.7"/>
  <circle cx="930" cy="390" r="8" fill="#D97706"/>
  <line x1="930" y1="415" x2="930" y2="428" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>

  <!-- Lane 4: Platform (light purple) -->
  <!-- Q1 spike + Q4 continuation -->
  <rect x="310" y="470" width="100" height="40" rx="8" fill="#A78BFA" opacity="0.6"/>
  <rect x="750" y="470" width="270" height="40" rx="8" fill="#A78BFA" opacity="0.7"/>
  <circle cx="1020" cy="490" r="8" fill="#7F77DD"/>

  <!-- Now marker -->
  <line x1="440" y1="135" x2="440" y2="555" stroke="#7F77DD" stroke-width="2.5" opacity="0.5"/>
  <rect x="425" y="135" width="30" height="18" rx="9" fill="#7F77DD" opacity="0.8"/>
  <rect x="431" y="140" width="18" height="8" rx="4" fill="white" opacity="0.9"/>

  <!-- Background -->
  <circle cx="1100" cy="120" r="80" fill="#7F77DD" opacity="0.04"/>
</svg>
