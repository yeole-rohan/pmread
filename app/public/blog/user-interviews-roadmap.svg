<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#7F77DD" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Central interview card -->
  <rect x="340" y="80" width="520" height="400" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="340" y="80" width="520" height="56" rx="20" fill="#7F77DD"/>
  <rect x="340" y="116" width="520" height="20" fill="#7F77DD"/>

  <!-- Header placeholder lines -->
  <rect x="370" y="100" width="90" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="370" y="116" width="60" height="7" rx="3" fill="white" opacity="0.35"/>

  <!-- Interview question 1 -->
  <rect x="370" y="165" width="130" height="9" rx="4" fill="#7F77DD" opacity="0.55"/>
  <rect x="370" y="182" width="460" height="7" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <rect x="370" y="195" width="380" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>

  <!-- Quote bubble 1 -->
  <rect x="370" y="220" width="440" height="52" rx="10" fill="#F5F3FF"/>
  <rect x="370" y="220" width="4" height="52" rx="2" fill="#7F77DD"/>
  <rect x="385" y="232" width="300" height="7" rx="3" fill="#7F77DD" opacity="0.4"/>
  <rect x="385" y="246" width="240" height="7" rx="3" fill="#7F77DD" opacity="0.3"/>
  <rect x="385" y="260" width="180" height="6" rx="3" fill="#7F77DD" opacity="0.22"/>

  <!-- Frequency badge -->
  <rect x="774" y="228" width="30" height="18" rx="9" fill="#7F77DD" opacity="0.18"/>
  <rect x="779" y="233" width="20" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>

  <!-- Interview question 2 -->
  <rect x="370" y="294" width="110" height="9" rx="4" fill="#7F77DD" opacity="0.55"/>
  <rect x="370" y="311" width="460" height="7" rx="3" fill="#9CA3AF" opacity="0.4"/>

  <!-- Quote bubble 2 -->
  <rect x="370" y="330" width="440" height="52" rx="10" fill="#F5F3FF"/>
  <rect x="370" y="330" width="4" height="52" rx="2" fill="#A78BFA"/>
  <rect x="385" y="342" width="260" height="7" rx="3" fill="#7F77DD" opacity="0.35"/>
  <rect x="385" y="356" width="200" height="7" rx="3" fill="#7F77DD" opacity="0.25"/>
  <rect x="385" y="368" width="140" height="6" rx="3" fill="#7F77DD" opacity="0.18"/>

  <!-- Frequency badge 2 -->
  <rect x="774" y="338" width="30" height="18" rx="9" fill="#A78BFA" opacity="0.2"/>
  <rect x="779" y="343" width="20" height="8" rx="4" fill="#A78BFA" opacity="0.5"/>

  <!-- Section dividers -->
  <line x1="370" y1="158" x2="820" y2="158" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="370" y1="287" x2="820" y2="287" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Arrow: interview → insight -->
  <line x1="860" y1="280" x2="940" y2="280" stroke="#7F77DD" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.4"/>
  <polygon points="940,274 952,280 940,286" fill="#7F77DD" opacity="0.4"/>

  <!-- Insight cluster (right side) -->
  <rect x="958" y="200" width="170" height="54" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="970" y="214" width="80" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="970" y="228" width="130" height="6" rx="3" fill="#9CA3AF" opacity="0.35"/>
  <rect x="970" y="240" width="100" height="6" rx="3" fill="#9CA3AF" opacity="0.28"/>

  <rect x="958" y="268" width="170" height="54" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="970" y="282" width="60" height="8" rx="4" fill="#A78BFA" opacity="0.5"/>
  <rect x="970" y="296" width="110" height="6" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="970" y="308" width="80" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <rect x="958" y="336" width="170" height="40" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="970" y="350" width="90" height="8" rx="4" fill="#6EE7B7" opacity="0.6"/>
  <rect x="970" y="362" width="120" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- Left: avatar stack (interviewees) -->
  <circle cx="200" cy="250" r="36" fill="#7F77DD" opacity="0.12"/>
  <circle cx="200" cy="238" r="14" fill="#7F77DD" opacity="0.25"/>
  <rect x="170" y="256" width="60" height="28" rx="14" fill="#7F77DD" opacity="0.15"/>

  <circle cx="155" cy="300" r="28" fill="#A78BFA" opacity="0.1"/>
  <circle cx="155" cy="290" r="11" fill="#A78BFA" opacity="0.25"/>
  <rect x="131" y="305" width="48" height="22" rx="11" fill="#A78BFA" opacity="0.12"/>

  <circle cx="245" cy="305" r="28" fill="#7F77DD" opacity="0.1"/>
  <circle cx="245" cy="295" r="11" fill="#7F77DD" opacity="0.2"/>
  <rect x="221" y="310" width="48" height="22" rx="11" fill="#7F77DD" opacity="0.12"/>

  <!-- Arrow from avatars to card -->
  <line x1="270" y1="280" x2="333" y2="280" stroke="#7F77DD" stroke-width="2" stroke-dasharray="5 4" opacity="0.35"/>
  <polygon points="333,274 345,280 333,286" fill="#7F77DD" opacity="0.35"/>

  <!-- Decorative dots -->
  <circle cx="120" cy="520" r="45" fill="#7F77DD" opacity="0.05"/>
  <circle cx="1100" cy="120" r="50" fill="#A78BFA" opacity="0.06"/>
</svg>
