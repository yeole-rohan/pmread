<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F7FF"/>
      <stop offset="100%" stop-color="#F0EDFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Three story cards in a Kanban-style column -->

  <!-- Card 1 — As a [user] -->
  <rect x="180" y="120" width="260" height="170" rx="14" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <!-- User icon -->
  <circle cx="220" cy="165" r="18" fill="#7F77DD" opacity="0.15"/>
  <circle cx="220" cy="160" r="9" fill="#7F77DD" opacity="0.7"/>
  <path d="M202 182 Q220 172 238 182" stroke="#7F77DD" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Story lines -->
  <rect x="248" y="153" width="60" height="7" rx="3" fill="#7F77DD" opacity="0.5"/>
  <rect x="248" y="167" width="160" height="6" rx="3" fill="#9CA3AF" opacity="0.45"/>
  <rect x="248" y="180" width="140" height="6" rx="3" fill="#9CA3AF" opacity="0.35"/>
  <!-- AC section -->
  <rect x="205" y="207" width="215" height="1" fill="#E5E7EB"/>
  <rect x="205" y="217" width="55" height="6" rx="3" fill="#A78BFA" opacity="0.6"/>
  <rect x="205" y="232" width="185" height="5" rx="2" fill="#9CA3AF" opacity="0.35"/>
  <rect x="205" y="244" width="165" height="5" rx="2" fill="#9CA3AF" opacity="0.3"/>
  <!-- Done badge -->
  <rect x="362" y="148" width="56" height="20" rx="10" fill="#DEF7EC"/>
  <circle cx="374" cy="158" r="5" fill="#10B981"/>
  <path d="M371 158 l2 2 l4-4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="381" y="153" width="30" height="5" rx="2" fill="#10B981" opacity="0.6"/>

  <!-- Card 2 — middle (highlighted / current) -->
  <rect x="470" y="80" width="260" height="190" rx="14" fill="white" stroke="#7F77DD" stroke-width="2"/>
  <!-- Purple accent bar at top -->
  <rect x="470" y="80" width="260" height="8" rx="14" fill="#7F77DD"/>
  <rect x="470" y="84" width="260" height="4" fill="#7F77DD"/>
  <!-- User icon -->
  <circle cx="510" cy="132" r="18" fill="#7F77DD" opacity="0.15"/>
  <circle cx="510" cy="127" r="9" fill="#7F77DD" opacity="0.8"/>
  <path d="M492 149 Q510 139 528 149" stroke="#7F77DD" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Story lines -->
  <rect x="538" y="120" width="70" height="7" rx="3" fill="#7F77DD" opacity="0.7"/>
  <rect x="538" y="134" width="170" height="6" rx="3" fill="#6B7280" opacity="0.5"/>
  <rect x="538" y="147" width="150" height="6" rx="3" fill="#6B7280" opacity="0.4"/>
  <!-- AC section -->
  <rect x="495" y="175" width="215" height="1" fill="#E5E7EB"/>
  <rect x="495" y="185" width="55" height="6" rx="3" fill="#A78BFA" opacity="0.7"/>
  <!-- GWT lines -->
  <rect x="495" y="200" width="30" height="5" rx="2" fill="#7F77DD" opacity="0.5"/>
  <rect x="530" y="200" width="155" height="5" rx="2" fill="#9CA3AF" opacity="0.4"/>
  <rect x="495" y="212" width="35" height="5" rx="2" fill="#7F77DD" opacity="0.5"/>
  <rect x="535" y="212" width="130" height="5" rx="2" fill="#9CA3AF" opacity="0.35"/>
  <rect x="495" y="224" width="33" height="5" rx="2" fill="#7F77DD" opacity="0.5"/>
  <rect x="533" y="224" width="145" height="5" rx="2" fill="#9CA3AF" opacity="0.35"/>

  <!-- Card 3 — As a [another user] -->
  <rect x="760" y="120" width="260" height="170" rx="14" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="800" cy="165" r="18" fill="#7F77DD" opacity="0.1"/>
  <circle cx="800" cy="160" r="9" fill="#A78BFA" opacity="0.7"/>
  <path d="M782 182 Q800 172 818 182" stroke="#A78BFA" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <rect x="828" y="153" width="60" height="7" rx="3" fill="#A78BFA" opacity="0.4"/>
  <rect x="828" y="167" width="170" height="6" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <rect x="828" y="180" width="150" height="6" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="785" y="207" width="215" height="1" fill="#E5E7EB"/>
  <rect x="785" y="217" width="55" height="6" rx="3" fill="#A78BFA" opacity="0.5"/>
  <rect x="785" y="232" width="185" height="5" rx="2" fill="#9CA3AF" opacity="0.3"/>

  <!-- Column labels (colored dots) -->
  <circle cx="230" cy="360" r="8" fill="#10B981"/>
  <rect x="248" y="354" width="50" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <circle cx="550" cy="360" r="8" fill="#7F77DD"/>
  <rect x="568" y="354" width="70" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <circle cx="830" cy="360" r="8" fill="#F59E0B"/>
  <rect x="848" y="354" width="60" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>

  <!-- Connecting arrow between cards -->
  <path d="M 440 230 L 468 230" stroke="#7F77DD" stroke-width="2" stroke-dasharray="5 3" opacity="0.4"/>
  <polygon points="468,230 460,225 460,235" fill="#7F77DD" opacity="0.4"/>
  <path d="M 730 230 L 758 230" stroke="#7F77DD" stroke-width="2" stroke-dasharray="5 3" opacity="0.4"/>
  <polygon points="758,230 750,225 750,235" fill="#7F77DD" opacity="0.4"/>

  <!-- Background decoration -->
  <circle cx="90" cy="500" r="60" fill="#7F77DD" opacity="0.04"/>
  <circle cx="1110" cy="150" r="70" fill="#A78BFA" opacity="0.05"/>
</svg>
