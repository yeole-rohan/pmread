  <rect x="795" y="112" width="120" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="795" y="128" width="80" height="8" rx="4" fill="white" opacity="0.4"/>

  <!-- The 4 forces -->
  <!-- Push arrow up-right (away from old) -->
  <circle cx="716" cy="215" r="22" fill="#ECFDF5"/>
  <path d="M704 227 L728 203" stroke="#0D9488" stroke-width="3" stroke-linecap="round"/>
  <polygon points="728,203 718,206 725,213" fill="#0D9488"/>
  <rect x="750" y="204" width="90" height="7" rx="3" fill="#0D9488" opacity="0.5"/>
  <rect x="750" y="217" width="250" height="6" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <rect x="750" y="229" width="210" height="6" rx="3" fill="#9CA3AF" opacity="0.35"/>

  <!-- Pull arrow down-right (toward new) -->
  <circle cx="716" cy="285" r="22" fill="#F5F3FF"/>
  <path d="M704 273 L728 297" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
  <polygon points="728,297 718,294 725,287" fill="#7F77DD"/>
  <rect x="750" y="274" width="90" height="7" rx="3" fill="#7F77DD" opacity="0.5"/>
  <rect x="750" y="287" width="200" height="6" rx="3" fill="#9CA3AF" opacity="0.4"/>

