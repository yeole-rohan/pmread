  <circle cx="600" cy="315" r="36" fill="#7F77DD"/>
  <rect x="580" y="309" width="40" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="585" y="321" width="30" height="8" rx="4" fill="white" opacity="0.5"/>

