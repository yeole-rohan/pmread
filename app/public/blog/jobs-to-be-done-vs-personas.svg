<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F7FF"/>
      <stop offset="100%" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- LEFT PANEL: Persona card -->
  <rect x="100" y="90" width="420" height="450" rx="20" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="100" y="90" width="420" height="70" rx="20" fill="#7F77DD" opacity="0.9"/>
  <rect x="100" y="140" width="420" height="20" fill="#7F77DD" opacity="0.9"/>

  <!-- Avatar circle in header -->
  <circle cx="200" cy="125" r="28" fill="white" opacity="0.2"/>
  <circle cx="200" cy="118" r="14" fill="white" opacity="0.7"/>
  <path d="M175 148 Q200 135 225 148" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Persona name placeholder -->
  <rect x="240" y="112" width="100" height="10" rx="5" fill="white" opacity="0.7"/>
  <rect x="240" y="128" width="70" height="8" rx="4" fill="white" opacity="0.4"/>

  <!-- Persona attribute rows -->
  <circle cx="136" cy="202" r="6" fill="#7F77DD" opacity="0.4"/>
  <rect x="154" y="196" width="80" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="154" y="209" width="280" height="6" rx="3" fill="#9CA3AF" opacity="0.4"/>

  <circle cx="136" cy="247" r="6" fill="#7F77DD" opacity="0.4"/>
  <rect x="154" y="241" width="60" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="154" y="254" width="250" height="6" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <rect x="154" y="267" width="220" height="6" rx="3" fill="#9CA3AF" opacity="0.35"/>

  <circle cx="136" cy="300" r="6" fill="#7F77DD" opacity="0.4"/>
  <rect x="154" y="294" width="90" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="154" y="307" width="260" height="6" rx="3" fill="#9CA3AF" opacity="0.4"/>

  <!-- Tool badges -->
  <rect x="134" y="340" width="70" height="24" rx="12" fill="#F5F3FF"/>
  <rect x="148" y="348" width="42" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="216" y="340" width="80" height="24" rx="12" fill="#F5F3FF"/>
  <rect x="228" y="348" width="54" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="308" y="340" width="60" height="24" rx="12" fill="#F5F3FF"/>
  <rect x="320" y="348" width="36" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>

