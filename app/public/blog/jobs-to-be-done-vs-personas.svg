  <circle cx="716" cy="425" r="22" fill="#FDF2F8"/>
  <path d="M704 425 A12 12 0 1 1 714 437" stroke="#EC4899" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="714,437 708,431 720,430" fill="#EC4899"/>
  <rect x="750" y="414" width="70" height="7" rx="3" fill="#EC4899" opacity="0.4"/>
  <rect x="750" y="427" width="220" height="6" rx="3" fill="#9CA3AF" opacity="0.35"/>

