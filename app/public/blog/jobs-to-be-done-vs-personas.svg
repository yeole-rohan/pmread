  <circle cx="716" cy="355" r="22" fill="#FFF7ED"/>
  <path d="M704 360 L710 350 L718 360 L726 350 L732 358" stroke="#F59E0B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="750" y="344" width="80" height="7" rx="3" fill="#F59E0B" opacity="0.5"/>
  <rect x="750" y="357" width="230" height="6" rx="3" fill="#9CA3AF" opacity="0.35"/>

