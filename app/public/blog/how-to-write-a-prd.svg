<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- PRD document shape -->
  <rect x="340" y="90" width="520" height="450" rx="18" fill="white" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#7F77DD" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="340" y="90" width="520" height="450" rx="18" fill="white"/>
  <rect x="340" y="90" width="520" height="60" rx="18" fill="#7F77DD"/>
  <rect x="340" y="130" width="520" height="20" fill="#7F77DD"/>

  <!-- Header bar label lines (no text, just form) -->
  <rect x="370" y="108" width="120" height="10" rx="5" fill="white" opacity="0.6"/>
  <rect x="370" y="123" width="80" height="7" rx="3" fill="white" opacity="0.35"/>

  <!-- Section 1: Problem Statement -->
  <rect x="370" y="175" width="100" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <rect x="370" y="195" width="440" height="7" rx="3" fill="#9CA3AF" opacity="0.5"/>
  <rect x="370" y="208" width="380" height="7" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <rect x="370" y="221" width="410" height="7" rx="3" fill="#9CA3AF" opacity="0.35"/>

  <!-- Section 2: Requirements -->
  <rect x="370" y="250" width="110" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <!-- Requirement rows with checkboxes -->
  <rect x="370" y="270" width="14" height="14" rx="3" fill="none" stroke="#7F77DD" stroke-width="2" opacity="0.6"/>
  <rect x="393" y="274" width="200" height="7" rx="3" fill="#9CA3AF" opacity="0.45"/>
  <rect x="370" y="293" width="14" height="14" rx="3" fill="#7F77DD" opacity="0.7"/>
  <path d="M373 300 l3 3 l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="393" y="297" width="240" height="7" rx="3" fill="#9CA3AF" opacity="0.45"/>
  <rect x="370" y="316" width="14" height="14" rx="3" fill="#7F77DD" opacity="0.7"/>
  <path d="M373 323 l3 3 l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="393" y="320" width="180" height="7" rx="3" fill="#9CA3AF" opacity="0.45"/>

  <!-- Section 3: User Stories -->
  <rect x="370" y="352" width="90" height="8" rx="4" fill="#7F77DD" opacity="0.5"/>
  <!-- Story card -->
  <rect x="370" y="370" width="200" height="60" rx="8" fill="#F5F3FF"/>
  <rect x="382" y="382" width="80" height="6" rx="3" fill="#7F77DD" opacity="0.5"/>
  <rect x="382" y="395" width="140" height="5" rx="2" fill="#9CA3AF" opacity="0.4"/>
  <rect x="382" y="406" width="120" height="5" rx="2" fill="#9CA3AF" opacity="0.35"/>
  <!-- Story card 2 -->
  <rect x="582" y="370" width="178" height="60" rx="8" fill="#F5F3FF"/>
  <rect x="594" y="382" width="80" height="6" rx="3" fill="#7F77DD" opacity="0.5"/>
  <rect x="594" y="395" width="130" height="5" rx="2" fill="#9CA3AF" opacity="0.4"/>
  <rect x="594" y="406" width="100" height="5" rx="2" fill="#9CA3AF" opacity="0.35"/>

  <!-- Section dividers -->
  <line x1="370" y1="168" x2="820" y2="168" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="370" y1="243" x2="820" y2="243" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="370" y1="345" x2="820" y2="345" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Pen/edit icon (bottom right of doc) -->
  <circle cx="820" cy="490" r="28" fill="#7F77DD"/>
  <path d="M808 498 l10-10 4 4 -10 10 z M806 500 l-2 6 6-2 z M821 487 l2-2 4 4 -2 2 z" fill="white"/>

  <!-- Decorative dots -->
  <circle cx="200" cy="180" r="40" fill="#7F77DD" opacity="0.06"/>
  <circle cx="1020" cy="480" r="50" fill="#A78BFA" opacity="0.07"/>
</svg>
