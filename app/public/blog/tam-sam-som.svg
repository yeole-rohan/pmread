<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#7F77DD" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Background card -->
  <rect x="80" y="60" width="1040" height="510" rx="24" fill="white" filter="url(#shadow)"/>

  <!-- Concentric circles (TAM > SAM > SOM) centered left -->
  <!-- TAM (outermost) -->
  <circle cx="420" cy="315" r="240" fill="#7F77DD" opacity="0.06"/>
  <circle cx="420" cy="315" r="240" fill="none" stroke="#7F77DD" stroke-width="1.5" opacity="0.2"/>

  <!-- SAM -->
  <circle cx="420" cy="315" r="160" fill="#7F77DD" opacity="0.08"/>
  <circle cx="420" cy="315" r="160" fill="none" stroke="#7F77DD" stroke-width="1.5" opacity="0.3"/>

  <!-- SOM (innermost) -->
  <circle cx="420" cy="315" r="80" fill="#7F77DD" opacity="0.18"/>
  <circle cx="420" cy="315" r="80" fill="none" stroke="#7F77DD" stroke-width="2" opacity="0.5"/>

  <!-- TAM label line -->
  <line x1="598" y1="195" x2="660" y2="170" stroke="#7F77DD" stroke-width="1.5" opacity="0.25" stroke-dasharray="4 3"/>
  <rect x="660" y="154" width="90" height="28" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <rect x="672" y="163" width="50" height="8" rx="4" fill="#7F77DD" opacity="0.45"/>
  <rect x="756" y="158" width="100" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>
  <rect x="756" y="170" width="80" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- SAM label line -->
  <line x1="566" y1="244" x2="660" y2="248" stroke="#7F77DD" stroke-width="1.5" opacity="0.3" stroke-dasharray="4 3"/>
  <rect x="660" y="232" width="90" height="28" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <rect x="672" y="241" width="50" height="8" rx="4" fill="#7F77DD" opacity="0.55"/>
  <rect x="756" y="236" width="110" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>
  <rect x="756" y="248" width="90" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- SOM label line -->
  <line x1="490" y1="300" x2="660" y2="326" stroke="#7F77DD" stroke-width="1.5" opacity="0.35" stroke-dasharray="4 3"/>
  <rect x="660" y="310" width="90" height="28" rx="8" fill="#7F77DD" opacity="0.12" stroke="#7F77DD" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="672" y="319" width="50" height="8" rx="4" fill="#7F77DD" opacity="0.7"/>
  <rect x="756" y="314" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>
  <rect x="756" y="326" width="100" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- Right side: breakdown bars -->
  <rect x="760" y="390" width="300" height="130" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- TAM bar -->
  <rect x="778" y="408" width="50" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>
  <rect x="778" y="422" width="264" height="14" rx="7" fill="#7F77DD" opacity="0.2"/>
  <rect x="1032" y="420" width="22" height="18" rx="5" fill="#7F77DD" opacity="0.15"/>

  <!-- SAM bar -->
  <rect x="778" y="450" width="50" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>
  <rect x="778" y="464" width="180" height="14" rx="7" fill="#7F77DD" opacity="0.35"/>
  <rect x="950" y="462" width="24" height="18" rx="5" fill="#7F77DD" opacity="0.2"/>

  <!-- SOM bar -->
  <rect x="778" y="492" width="50" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>
  <rect x="778" y="506" width="90" height="14" rx="7" fill="#7F77DD" opacity="0.6"/>
  <rect x="860" y="504" width="24" height="18" rx="5" fill="#7F77DD" opacity="0.4"/>

  <!-- Funnel annotation: bottom-up vs top-down -->
  <rect x="110" y="450" width="200" height="60" rx="10" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <rect x="128" y="466" width="80" height="8" rx="4" fill="#7F77DD" opacity="0.45"/>
  <rect x="128" y="480" width="160" height="6" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="128" y="492" width="130" height="6" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- Decorative -->
  <circle cx="80" cy="80" r="30" fill="#7F77DD" opacity="0.04"/>
  <circle cx="1120" cy="560" r="50" fill="#A78BFA" opacity="0.05"/>
</svg>
