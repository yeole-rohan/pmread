<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#7F77DD" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Main card -->
  <rect x="100" y="60" width="680" height="510" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="100" y="60" width="680" height="52" rx="20" fill="#7F77DD"/>
  <rect x="100" y="94" width="680" height="18" fill="#7F77DD"/>
  <rect x="128" y="76" width="120" height="10" rx="5" fill="white" opacity="0.6"/>

  <!-- Given/When/Then structure -->
  <!-- Given block -->
  <rect x="120" y="138" width="640" height="70" rx="12" fill="#F5F3FF"/>
  <rect x="120" y="138" width="6" height="70" rx="3" fill="#7F77DD" opacity="0.7"/>
  <rect x="140" y="150" width="50" height="10" rx="5" fill="#7F77DD" opacity="0.65"/>
  <rect x="140" y="168" width="500" height="7" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <rect x="140" y="181" width="380" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="140" y="194" width="440" height="7" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- When block -->
  <rect x="120" y="222" width="640" height="60" rx="12" fill="#F0EDFF"/>
  <rect x="120" y="222" width="6" height="60" rx="3" fill="#A78BFA" opacity="0.7"/>
  <rect x="140" y="234" width="50" height="10" rx="5" fill="#A78BFA" opacity="0.65"/>
  <rect x="140" y="252" width="440" height="7" rx="3" fill="#9CA3AF" opacity="0.38"/>
  <rect x="140" y="265" width="360" height="7" rx="3" fill="#9CA3AF" opacity="0.28"/>

  <!-- Then block -->
  <rect x="120" y="296" width="640" height="80" rx="12" fill="#F0FDF4"/>
  <rect x="120" y="296" width="6" height="80" rx="3" fill="#10B981" opacity="0.7"/>
  <rect x="140" y="308" width="50" height="10" rx="5" fill="#10B981" opacity="0.65"/>
  <rect x="140" y="326" width="500" height="7" rx="3" fill="#9CA3AF" opacity="0.38"/>
  <rect x="140" y="339" width="420" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="140" y="352" width="460" height="7" rx="3" fill="#9CA3AF" opacity="0.25"/>
  <rect x="140" y="365" width="380" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- And block -->
  <rect x="120" y="390" width="640" height="52" rx="12" fill="#F0FDF4"/>
  <rect x="120" y="390" width="6" height="52" rx="3" fill="#10B981" opacity="0.5"/>
  <rect x="140" y="402" width="40" height="10" rx="5" fill="#10B981" opacity="0.5"/>
  <rect x="140" y="420" width="460" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="140" y="433" width="360" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- But block (edge case) -->
  <rect x="120" y="456" width="640" height="52" rx="12" fill="#FFF7ED"/>
  <rect x="120" y="456" width="6" height="52" rx="3" fill="#F59E0B" opacity="0.65"/>
  <rect x="140" y="468" width="40" height="10" rx="5" fill="#F59E0B" opacity="0.65"/>
  <rect x="140" y="486" width="480" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="140" y="499" width="380" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- Right panel: checklist of coverage -->
  <rect x="830" y="60" width="310" height="510" rx="20" fill="white" filter="url(#shadow)"/>
  <rect x="830" y="60" width="310" height="52" rx="20" fill="#7F77DD" opacity="0.85"/>
  <rect x="830" y="94" width="310" height="18" fill="#7F77DD" opacity="0.85"/>
  <rect x="856" y="76" width="100" height="10" rx="5" fill="white" opacity="0.55"/>

  <!-- Coverage checklist items -->
  <!-- Happy path -->
  <circle cx="866" cy="148" r="10" fill="#10B981" opacity="0.75"/>
  <path d="M860 148 l3 3 l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="884" y="142" width="100" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="884" y="155" width="140" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- Empty state -->
  <circle cx="866" cy="198" r="10" fill="#10B981" opacity="0.75"/>
  <path d="M860 198 l3 3 l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="884" y="192" width="90" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="884" y="205" width="130" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- Error state -->
  <circle cx="866" cy="248" r="10" fill="#10B981" opacity="0.75"/>
  <path d="M860 248 l3 3 l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="884" y="242" width="80" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="884" y="255" width="120" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- Permission variants -->
  <circle cx="866" cy="298" r="10" fill="#10B981" opacity="0.75"/>
  <path d="M860 298 l3 3 l7-7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="884" y="292" width="120" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="884" y="305" width="100" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- Limit cases -->
  <circle cx="866" cy="348" r="10" fill="#F59E0B" opacity="0.7"/>
  <rect x="862" y="344" width="8" height="8" rx="1" fill="white" opacity="0.7"/>
  <rect x="884" y="342" width="100" height="8" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="884" y="355" width="140" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>

  <!-- Performance -->
  <circle cx="866" cy="398" r="10" fill="none" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="884" y="392" width="110" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>
  <rect x="884" y="405" width="90" height="6" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- Accessibility -->
  <circle cx="866" cy="448" r="10" fill="none" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="884" y="442" width="100" height="8" rx="4" fill="#9CA3AF" opacity="0.35"/>
  <rect x="884" y="455" width="130" height="6" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- Bottom dividers -->
  <line x1="848" y1="173" x2="1118" y2="173" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="848" y1="223" x2="1118" y2="223" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="848" y1="273" x2="1118" y2="273" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="848" y1="323" x2="1118" y2="323" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="848" y1="373" x2="1118" y2="373" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="848" y1="423" x2="1118" y2="423" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="848" y1="473" x2="1118" y2="473" stroke="#F3F4F6" stroke-width="1"/>

  <circle cx="70" cy="550" r="45" fill="#7F77DD" opacity="0.04"/>
  <circle cx="1140" cy="90" r="40" fill="#A78BFA" opacity="0.05"/>
</svg>
