<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#7F77DD" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Main dashboard card -->
  <rect x="100" y="70" width="1000" height="490" rx="20" fill="white" filter="url(#shadow)"/>

  <!-- Dashboard header -->
  <rect x="100" y="70" width="1000" height="52" rx="20" fill="#7F77DD"/>
  <rect x="100" y="104" width="1000" height="18" fill="#7F77DD"/>
  <rect x="130" y="88" width="100" height="10" rx="5" fill="white" opacity="0.6"/>
  <rect x="238" y="90" width="60" height="6" rx="3" fill="white" opacity="0.3"/>

  <!-- North star metric — highlighted top row -->
  <rect x="130" y="148" width="940" height="80" rx="14" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
  <!-- Star icon placeholder -->
  <polygon points="190,178 195,163 200,178 216,178 203,187 208,202 195,193 182,202 187,187 174,178" fill="#7F77DD" opacity="0.35"/>
  <rect x="225" y="165" width="120" height="9" rx="4" fill="#7F77DD" opacity="0.6"/>
  <rect x="225" y="182" width="220" height="7" rx="3" fill="#9CA3AF" opacity="0.4"/>
  <rect x="225" y="197" width="170" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
