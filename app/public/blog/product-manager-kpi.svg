  <line x1="475" y1="374" x2="695" y2="374" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Tile 3: Revenue/NRR -->
  <rect x="780" y="252" width="290" height="130" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="800" y="272" width="70" height="9" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="800" y="290" width="140" height="24" rx="6" fill="#10B981" opacity="0.12"/>
  <rect x="806" y="296" width="90" height="12" rx="4" fill="#10B981" opacity="0.45"/>
  <rect x="800" y="330" width="60" height="8" rx="4" fill="#9CA3AF" opacity="0.3"/>
  <!-- NRR > 100% indicator -->
  <rect x="800" y="346" width="240" height="12" rx="6" fill="#E5E7EB"/>
  <rect x="800" y="346" width="252" height="12" rx="6" fill="#10B981" opacity="0.5"/>
  <rect x="924" y="342" width="2" height="20" rx="1" fill="#374151" opacity="0.3"/>
  <rect x="800" y="366" width="60" height="6" rx="3" fill="#9CA3AF" opacity="0.25"/>
  <rect x="912" y="366" width="70" height="6" rx="3" fill="#10B981" opacity="0.4"/>

  <!-- Bottom row: activity vs outcome explanation -->
  <rect x="130" y="408" width="940" height="110" rx="14" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <!-- Three columns with labels -->
  <rect x="160" y="428" width="70" height="8" rx="4" fill="#F59E0B" opacity="0.5"/>
  <rect x="160" y="444" width="200" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="160" y="457" width="160" height="7" rx="3" fill="#9CA3AF" opacity="0.25"/>
  <rect x="160" y="470" width="140" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <line x1="440" y1="420" x2="440" y2="508" stroke="#FDE68A" stroke-width="1"/>

  <rect x="465" y="428" width="90" height="8" rx="4" fill="#F59E0B" opacity="0.5"/>
  <rect x="465" y="444" width="200" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="465" y="457" width="170" height="7" rx="3" fill="#9CA3AF" opacity="0.25"/>
  <rect x="465" y="470" width="150" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <line x1="760" y1="420" x2="760" y2="508" stroke="#FDE68A" stroke-width="1"/>

  <rect x="785" y="428" width="80" height="8" rx="4" fill="#EF4444" opacity="0.4"/>
  <rect x="785" y="444" width="210" height="7" rx="3" fill="#9CA3AF" opacity="0.3"/>
  <rect x="785" y="457" width="170" height="7" rx="3" fill="#9CA3AF" opacity="0.25"/>
  <rect x="785" y="470" width="130" height="7" rx="3" fill="#9CA3AF" opacity="0.22"/>

  <!-- Decorative -->
  <circle cx="80" cy="560" r="40" fill="#7F77DD" opacity="0.04"/>
  <circle cx="1130" cy="80" r="45" fill="#A78BFA" opacity="0.05"/>
