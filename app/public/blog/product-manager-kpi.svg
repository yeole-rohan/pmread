  <rect x="826" y="168" width="68" height="16" rx="5" fill="#7F77DD" opacity="0.4"/>
  <rect x="830" y="196" width="60" height="8" rx="4" fill="#22C55E" opacity="0.5"/>

  <!-- Three KPI tiles -->
  <!-- Tile 1: Activation -->
  <rect x="130" y="252" width="290" height="130" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="150" y="272" width="90" height="9" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="150" y="290" width="140" height="24" rx="6" fill="#7F77DD" opacity="0.15"/>
  <rect x="156" y="296" width="90" height="12" rx="4" fill="#7F77DD" opacity="0.5"/>
  <!-- Trend line up -->
  <polyline points="150,355 175,345 210,340 245,328 280,315 315,302 375,290" fill="none" stroke="#7F77DD" stroke-width="2.5" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tile 2: Retention -->
  <rect x="455" y="252" width="290" height="130" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="475" y="272" width="80" height="9" rx="4" fill="#9CA3AF" opacity="0.4"/>
  <rect x="475" y="290" width="140" height="24" rx="6" fill="#A78BFA" opacity="0.15"/>
  <rect x="481" y="296" width="90" height="12" rx="4" fill="#A78BFA" opacity="0.5"/>
  <!-- Retention bar chart -->
  <rect x="480" y="352" width="24" height="20" rx="3" fill="#A78BFA" opacity="0.3"/>
  <rect x="512" y="342" width="24" height="30" rx="3" fill="#A78BFA" opacity="0.4"/>
  <rect x="544" y="334" width="24" height="38" rx="3" fill="#A78BFA" opacity="0.5"/>
  <rect x="576" y="328" width="24" height="44" rx="3" fill="#A78BFA" opacity="0.65"/>
  <rect x="608" y="322" width="24" height="50" rx="3" fill="#A78BFA" opacity="0.75"/>
