<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F7FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="1080" cy="100" r="220" fill="#7F77DD" fill-opacity="0.06"/>
  <circle cx="120" cy="530" r="180" fill="#A78BFA" fill-opacity="0.07"/>

  <!-- Centre card -->
  <rect x="180" y="140" width="840" height="350" rx="28" fill="url(#card)" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Logo mark — purple square with P -->
  <rect x="240" y="210" width="56" height="56" rx="14" fill="#7F77DD"/>
  <rect x="256" y="224" width="8" height="28" rx="3" fill="white"/>
  <rect x="264" y="224" width="14" height="8" rx="3" fill="white"/>
  <rect x="264" y="232" width="14" height="8" rx="3" fill="white" fill-opacity="0.6"/>

  <!-- PM + Read wordmark blocks -->
  <rect x="312" y="222" width="52" height="16" rx="8" fill="#7F77DD" fill-opacity="0.9"/>
  <rect x="372" y="222" width="76" height="16" rx="8" fill="#9CA3AF" fill-opacity="0.5"/>

  <!-- Tagline bar -->
  <rect x="240" y="300" width="520" height="14" rx="7" fill="#1F1B4B" fill-opacity="0.75"/>
  <rect x="240" y="324" width="380" height="10" rx="5" fill="#6B7280" fill-opacity="0.4"/>

  <!-- CTA pill -->
  <rect x="240" y="360" width="160" height="40" rx="20" fill="#7F77DD"/>
  <rect x="260" y="374" width="120" height="12" rx="6" fill="white" fill-opacity="0.85"/>

  <!-- Right side: mini product screenshot suggestion -->
  <rect x="800" y="180" width="180" height="310" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Header bar -->
  <rect x="800" y="180" width="180" height="36" rx="16" fill="#7F77DD" fill-opacity="0.85"/>
  <rect x="800" y="198" width="180" height="18" fill="#7F77DD" fill-opacity="0.85"/>
  <!-- Insight rows -->
  <rect x="816" y="232" width="8" height="8" rx="4" fill="#7F77DD" fill-opacity="0.5"/>
  <rect x="830" y="233" width="100" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.4"/>
  <rect x="816" y="248" width="8" height="8" rx="4" fill="#7F77DD" fill-opacity="0.5"/>
  <rect x="830" y="249" width="80" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.4"/>
  <rect x="816" y="264" width="8" height="8" rx="4" fill="#0D9488" fill-opacity="0.5"/>
  <rect x="830" y="265" width="110" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.35"/>
  <rect x="816" y="280" width="8" height="8" rx="4" fill="#0D9488" fill-opacity="0.5"/>
  <rect x="830" y="281" width="70" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.35"/>
  <rect x="816" y="296" width="8" height="8" rx="4" fill="#F59E0B" fill-opacity="0.5"/>
  <rect x="830" y="297" width="90" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.3"/>
  <!-- Divider -->
  <line x1="816" y1="318" x2="964" y2="318" stroke="#E5E7EB" stroke-width="1"/>
  <!-- PRD button -->
  <rect x="816" y="330" width="148" height="28" rx="8" fill="#7F77DD" fill-opacity="0.15"/>
  <rect x="832" y="338" width="116" height="12" rx="6" fill="#7F77DD" fill-opacity="0.5"/>
  <!-- Doc preview lines -->
  <rect x="816" y="376" width="148" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.25"/>
  <rect x="816" y="389" width="120" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.2"/>
  <rect x="816" y="402" width="130" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.2"/>
  <rect x="816" y="415" width="100" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.2"/>
  <rect x="816" y="428" width="140" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.15"/>
  <rect x="816" y="441" width="80" height="6" rx="3" fill="#9CA3AF" fill-opacity="0.15"/>

  <!-- Bottom domain strip -->
  <rect x="180" y="540" width="840" height="1" fill="#E5E7EB"/>
  <rect x="240" y="558" width="80" height="8" rx="4" fill="#9CA3AF" fill-opacity="0.4"/>
</svg>
